<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大西庫存管理系統 - Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0d1117; color: #f1f5f9; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo } = React;
        const {
            LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid,
            Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell
        } = Recharts;

        // --- MOCK DATA ---
        const STORES = [
            { id: 1, name: "大西倉庫", type: "warehouse", color: "#f97316" },
            { id: 2, name: "士捷分店", type: "branch", color: "#3b82f6" },
            { id: 3, name: "石牌分店", type: "branch", color: "#8b5cf6" },
            { id: 4, name: "旗艦分店", type: "branch", color: "#10b981" },
        ];

        const INITIAL_PRODUCTS = [
            { id: 1, name: "醫療口罩 (50入)", sku: "MASK-50", unit: "盒", quantity: 85, threshold: 100, avgCost: 120, supplier: "台灣防護股份有限公司", supplierContact: "02-2345-6789" },
            { id: 2, name: "酒精濕紙巾 (100片)", sku: "WP-100", unit: "包", quantity: 210, threshold: 80, avgCost: 65, supplier: "清潔大師有限公司", supplierContact: "04-1234-5678" },
            { id: 3, name: "血壓計", sku: "BP-001", unit: "台", quantity: 12, threshold: 20, avgCost: 1580, supplier: "歐姆龍醫療", supplierContact: "03-9876-5432" },
            { id: 4, name: "血糖試紙 (50片)", sku: "GS-050", unit: "盒", quantity: 45, threshold: 30, avgCost: 380, supplier: "羅氏診斷", supplierContact: "02-8765-4321" },
            { id: 5, name: "彈性繃帶 (5cm)", sku: "EB-5CM", unit: "卷", quantity: 6, threshold: 50, avgCost: 28, supplier: "台灣防護股份有限公司", supplierContact: "02-2345-6789" },
            { id: 6, name: "體溫計 (電子)", sku: "TH-EL", unit: "支", quantity: 33, threshold: 25, avgCost: 245, supplier: "精準醫療器材", supplierContact: "06-5432-1098" },
        ];

        const TREND_DATA = [
            { date: "04/23", 大西倉庫: 320, 士捷: 45, 石牌: 38, 旗艦: 52 },
            { date: "04/24", 大西倉庫: 285, 士捷: 50, 石牌: 42, 旗艦: 48 },
            { date: "04/25", 大西倉庫: 310, 士捷: 38, 石牌: 55, 旗艦: 60 },
            { date: "04/26", 大西倉庫: 260, 士捷: 62, 石牌: 48, 旗艦: 45 },
            { date: "04/27", 大西倉庫: 230, 士捷: 55, 石牌: 40, 旗艦: 52 },
            { date: "04/28", 大西倉庫: 195, 士捷: 48, 石牌: 35, 旗艦: 58 },
            { date: "04/29", 大西倉庫: 170, 士捷: 42, 石牌: 50, 旗艦: 44 },
        ];

        const BRANCH_USAGE = [
            { name: "士捷分店", value: 340, fill: "#3b82f6" },
            { name: "石牌分店", value: 308, fill: "#8b5cf6" },
            { name: "旗艦分店", value: 359, fill: "#10b981" },
        ];

        const RECENT_TRANSACTIONS = [
            { id: 1, time: "14:32", type: "出貨", product: "醫療口罩 (50入)", qty: 15, from: "大西倉庫", to: "士捷分店", operator: "張小明" },
            { id: 2, time: "13:15", type: "進貨", product: "血壓計", qty: 5, from: "歐姆龍醫療", to: "大西倉庫", operator: "系統" },
            { id: 3, time: "11:48", type: "出貨", product: "酒精濕紙巾 (100片)", qty: 30, from: "大西倉庫", to: "旗艦分店", operator: "李大華" },
            { id: 4, time: "10:20", type: "出貨", product: "彈性繃帶 (5cm)", qty: 20, from: "大西倉庫", to: "石牌分店", operator: "王志遠" },
            { id: 5, time: "09:05", type: "進貨", product: "血糖試紙 (50片)", qty: 50, from: "羅氏診斷", to: "大西倉庫", operator: "系統" },
        ];

        const isLowStock = (p) => p.quantity < p.threshold;
        const fmtCurrency = (n) => `NT$ ${n.toLocaleString()}`;

        // --- SUB-COMPONENTS ---
        function StatCard({ label, value, sub, accent, icon }) {
            return (
                <div className="bg-white/5 border border-white/10 rounded-2xl p-5 relative overflow-hidden">
                    <div className="text-3xl mb-1">{icon}</div>
                    <div className="text-slate-400 text-xs uppercase tracking-wider mb-1.5">{label}</div>
                    <div className="text-2xl font-bold font-mono" style={{ color: accent || "#f1f5f9" }}>{value}</div>
                    {sub && <div className="text-slate-500 text-xs mt-1">{sub}</div>}
                    <div className="absolute -right-4 -bottom-4 w-20 h-20 rounded-full" style={{ background: `${accent || "#3b82f6"}18` }} />
                </div>
            );
        }

        function CustomTooltip({ active, payload, label }) {
            if (!active || !payload?.length) return null;
            return (
                <div className="bg-[#1a1f2e] border border-white/10 rounded-lg p-3 text-xs">
                    <div className="text-slate-400 mb-1.5">{label}</div>
                    {payload.map(p => (
                        <div key={p.name} className="flex justify-between gap-4" style={{ color: p.color }}>
                            <span>{p.name}</span><span className="font-bold">{p.value}</span>
                        </div>
                    ))}
                </div>
            );
        }

        // --- MAIN APP ---
        function InventoryDashboard() {
            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [transactions, setTransactions] = useState(RECENT_TRANSACTIONS);
            const [activeTab, setActiveTab] = useState("overview");
            const [searchQ, setSearchQ] = useState("");

            const stats = useMemo(() => {
                const lowStock = products.filter(isLowStock);
                const totalValue = products.reduce((acc, p) => acc + p.quantity * p.avgCost, 0);
                return { lowStock: lowStock.length, totalValue, totalProducts: products.length };
            }, [products]);

            const filteredProducts = products.filter(p => p.name.includes(searchQ) || p.sku.includes(searchQ));

            return (
                <div className="min-h-screen bg-[#0d1117] text-slate-200 font-sans p-8">
                    <header className="flex items-center justify-between mb-8 pb-6 border-b border-white/5">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-orange-500 rounded-lg flex items-center justify-center text-xl shadow-lg shadow-orange-500/20">🏪</div>
                            <div>
                                <h1 className="text-lg font-bold leading-tight">大西庫存管理系統</h1>
                                <p className="text-[10px] text-slate-500 tracking-[0.2em] font-mono">DAXI INVENTORY MGMT</p>
                            </div>
                        </div>
                        <nav className="flex gap-2">
                            {["overview", "inventory", "reports"].map(t => (
                                <button
                                    key={t}
                                    onClick={() => setActiveTab(t)}
                                    className={`px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${activeTab === t ? "bg-orange-500/20 text-orange-500 border border-orange-500" : "text-slate-500 hover:bg-white/5"}`}
                                >
                                    {t.toUpperCase()}
                                </button>
                            ))}
                        </nav>
                        <div className="flex items-center gap-4">
                            {stats.lowStock > 0 && (
                                <div className="bg-red-500/10 border border-red-500/30 text-red-500 px-3 py-1 rounded-full text-xs font-bold animate-pulse">
                                    ⚠️ {stats.lowStock} LOW STOCK
                                </div>
                            )}
                            <button className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-orange-500/30">
                                + NEW ORDER
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <StatCard label="Total Items" value={stats.totalProducts} icon="📦" sub="items available" accent="#3b82f6" />
                            <StatCard label="Total Value" value={fmtCurrency(stats.totalValue)} icon="💰" sub="current valuation" accent="#10b981" />
                            <StatCard label="Alerts" value={stats.lowStock} icon="⚠️" sub="need restocking" accent={stats.lowStock > 0 ? "#ef4444" : "#10b981"} />
                            <StatCard label="Transactions" value={transactions.length} icon="🔄" sub="today's activity" accent="#f59e0b" />
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2 bg-white/5 border border-white/10 rounded-2xl p-6">
                                <h3 className="text-sm font-semibold text-slate-400 mb-6 flex items-center gap-2">📉 TRENDING STOCK (7 DAYS)</h3>
                                <div className="h-64">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={TREND_DATA}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#ffffff10" vertical={false} />
                                            <XAxis dataKey="date" stroke="#64748b" tick={{ fontSize: 10 }} axisLine={false} />
                                            <YAxis stroke="#64748b" tick={{ fontSize: 10 }} axisLine={false} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Line type="monotone" dataKey="大西倉庫" stroke="#f97316" strokeWidth={3} dot={false} />
                                            <Line type="monotone" dataKey="士捷" stroke="#3b82f6" strokeWidth={2} dot={false} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                            <div className="bg-white/5 border border-white/10 rounded-2xl p-6">
                                <h3 className="text-sm font-semibold text-slate-400 mb-6">🏬 BRANCH USAGE</h3>
                                <div className="h-48">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={BRANCH_USAGE} cx="50%" cy="50%" innerRadius={50} outerRadius={70} dataKey="value">
                                                {BRANCH_USAGE.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.fill} />)}
                                            </Pie>
                                            <Tooltip content={<CustomTooltip />} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="space-y-3 mt-4">
                                    {BRANCH_USAGE.map(b => (
                                        <div key={b.name} className="flex justify-between text-xs">
                                            <span className="flex items-center gap-2 text-slate-400"><span className="w-2 h-2 rounded-full" style={{ background: b.fill }} />{b.name}</span>
                                            <span className="font-mono">{b.value}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="bg-white/5 border border-white/10 rounded-2xl p-6">
                            <h3 className="text-sm font-semibold text-slate-400 mb-6">🔄 RECENT ACTIVITY</h3>
                            <div className="space-y-2">
                                {transactions.map(tx => (
                                    <div key={tx.id} className="bg-white/5 rounded-xl p-4 flex items-center justify-between text-sm">
                                        <div className="flex items-center gap-4">
                                            <span className="font-mono text-slate-500 text-xs">{tx.time}</span>
                                            <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${tx.type === "進貨" ? "bg-green-500/20 text-green-500" : "bg-orange-500/20 text-orange-500"}`}>{tx.type}</span>
                                            <span className="font-semibold">{tx.product}</span>
                                        </div>
                                        <div className="flex items-center gap-8 text-slate-400">
                                            <span className="text-xs">{tx.from} → {tx.to}</span>
                                            <span className="font-mono text-slate-200">×{tx.qty}</span>
                                            <span className="text-[10px]">{tx.operator}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InventoryDashboard />);
    </script>
</body>
</html>
