<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大西庫存管理系統 - Dashboard</title>
    <!-- 使用開發者版本以便查看報錯 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0d1117; color: #f1f5f9; font-family: sans-serif; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="root">
        <div style="padding: 50px; text-align: center;">載入中... 如果畫面持續全黑，請檢查網路連線。</div>
    </div>
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const {
            LineChart, Line, XAxis, YAxis, CartesianGrid,
            Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell
        } = Recharts;

        const STORES = [
            { id: 1, name: "大西倉庫", type: "warehouse", color: "#f97316" },
            { id: 2, name: "士捷分店", type: "branch", color: "#3b82f6" },
            { id: 3, name: "石牌分店", type: "branch", color: "#8b5cf6" },
            { id: 4, name: "旗艦分店", type: "branch", color: "#10b981" },
        ];

        const INITIAL_PRODUCTS = [
            { id: 1, name: "醫療口罩 (50入)", sku: "MASK-50", unit: "盒", quantity: 85, threshold: 100, avgCost: 120 },
            { id: 2, name: "酒精濕紙巾 (100片)", sku: "WP-100", unit: "包", quantity: 210, threshold: 80, avgCost: 65 },
            { id: 3, name: "血壓計", sku: "BP-001", unit: "台", quantity: 12, threshold: 20, avgCost: 1580 },
            { id: 4, name: "血糖試紙 (50片)", sku: "GS-050", unit: "盒", quantity: 45, threshold: 30, avgCost: 380 },
            { id: 5, name: "彈性繃帶 (5cm)", sku: "EB-5CM", unit: "卷", quantity: 6, threshold: 50, avgCost: 28 },
            { id: 6, name: "體溫計 (電子)", sku: "TH-EL", unit: "支", quantity: 33, threshold: 25, avgCost: 245 },
        ];

        const TREND_DATA = [
            { date: "04/23", "大西倉庫": 320, "士捷": 45 },
            { date: "04/24", "大西倉庫": 285, "士捷": 50 },
            { date: "04/25", "大西倉庫": 310, "士捷": 38 },
            { date: "04/26", "大西倉庫": 260, "士捷": 62 },
            { date: "04/27", "大西倉庫": 230, "士捷": 55 },
            { date: "04/28", "大西倉庫": 195, "士捷": 48 },
            { date: "04/29", "大西倉庫": 170, "士捷": 42 },
        ];

        function StatCard({ label, value, accent, icon }) {
            return (
                <div className="bg-slate-800/50 border border-slate-700 p-4 rounded-xl">
                    <div className="text-2xl mb-2">{icon}</div>
                    <div className="text-slate-400 text-xs mb-1 uppercase tracking-tight">{label}</div>
                    <div className="text-xl font-bold" style={{ color: accent || "#fff" }}>{value}</div>
                </div>
            );
        }

        function App() {
            const stats = useMemo(() => {
                const totalValue = INITIAL_PRODUCTS.reduce((acc, p) => acc + p.quantity * p.avgCost, 0);
                const lowStock = INITIAL_PRODUCTS.filter(p => p.quantity < p.threshold).length;
                return { totalValue, lowStock, totalItems: INITIAL_PRODUCTS.length };
            }, []);

            return (
                <div className="p-6 max-w-4xl mx-auto w-full">
                    <header className="mb-8 flex items-center gap-3">
                        <div className="bg-orange-500 w-10 h-10 rounded flex items-center justify-center text-xl">🏠</div>
                        <div>
                            <h1 className="text-xl font-bold">大西庫存管理</h1>
                            <p className="text-xs text-slate-500 font-mono">DAXI INVENTORY SYSTEM</p>
                        </div>
                    </header>
                    
                    <div className="grid grid-cols-3 gap-4 mb-8">
                        <StatCard icon="💰" label="庫存總值" value={`NT$ ${stats.totalValue.toLocaleString()}`} accent="#10b981" />
                        <StatCard icon="⚠️" label="低庫存警示" value={`${stats.lowStock} 項`} accent="#ef4444" />
                        <StatCard icon="📦" label="總品項" value={stats.totalItems} accent="#3b82f6" />
                    </div>

                    <div className="bg-slate-800/30 border border-slate-700 p-6 rounded-2xl">
                        <h2 className="text-sm font-bold mb-6 text-slate-400">📈 庫存動態趨勢</h2>
                        <div style={{ width: '100%', height: 250 }}>
                            <ResponsiveContainer>
                                <LineChart data={TREND_DATA}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#334155" vertical={false} />
                                    <XAxis dataKey="date" stroke="#64748b" tick={{fontSize: 12}} />
                                    <YAxis stroke="#64748b" tick={{fontSize: 12}} />
                                    <Tooltip contentStyle={{backgroundColor: '#1e293b', border: 'none', borderRadius: '8px'}} />
                                    <Line type="monotone" dataKey="大西倉庫" stroke="#f97316" strokeWidth={3} />
                                    <Line type="monotone" dataKey="士捷" stroke="#3b82f6" strokeWidth={2} />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
