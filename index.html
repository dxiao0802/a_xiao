<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大西庫存管理系統 - 超穩定版</title>
    <!-- 使用完全獨立的 UMD 連結，避免解析問題 -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #f1f5f9; font-family: -apple-system, system-ui, sans-serif; }
    </style>
</head>
<body>
    <div id="root">
        <div style="padding: 100px 20px; text-align: center; color: #94a3b8;">
            系統初始化中...<br/>
            (若畫面未跳轉，請確保已開啟 JavaScript)
        </div>
    </div>

    <script type="text/babel" data-presets="react">
        const { useState } = React;

        function App() {
            return (
                <div className="p-6 max-w-md mx-auto min-h-screen">
                    <header className="mb-8 flex items-center gap-3">
                        <div className="bg-orange-500 w-12 h-12 rounded-xl flex items-center justify-center text-2xl shadow-lg shadow-orange-500/20">🏠</div>
                        <div>
                            <h1 className="text-xl font-bold text-white">大西庫存管理</h1>
                            <p className="text-[10px] text-slate-500 font-mono tracking-widest uppercase">Inventory Dashboard</p>
                        </div>
                    </header>
                    
                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <div className="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl">
                            <div className="text-slate-400 text-[10px] mb-1">庫存總值</div>
                            <div className="text-lg font-bold text-emerald-400">NT$ 98,540</div>
                        </div>
                        <div className="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl">
                            <div className="text-slate-400 text-[10px] mb-1">低庫存警示</div>
                            <div className="text-lg font-bold text-rose-500">3 項</div>
                        </div>
                    </div>

                    <div className="bg-slate-800/50 border border-slate-700 p-5 rounded-2xl mb-6 text-center">
                        <div className="text-slate-500 text-xs mb-4">-- 儀表板趨勢 (預覽) --</div>
                        <div className="flex justify-around items-end h-24 gap-2">
                            <div className="bg-orange-500/40 w-full rounded-t-lg" style={{height: '60%'}}></div>
                            <div className="bg-orange-500/60 w-full rounded-t-lg" style={{height: '85%'}}></div>
                            <div className="bg-orange-500 w-full rounded-t-lg" style={{height: '100%'}}></div>
                            <div className="bg-orange-500/70 w-full rounded-t-lg" style={{height: '45%'}}></div>
                        </div>
                    </div>

                    <div className="space-y-3">
                        <h3 className="text-xs font-bold text-slate-500 px-1 uppercase">最近異動記錄</h3>
                        {[
                            { item: "醫療口罩", type: "出貨", qty: 15 },
                            { item: "酒精濕巾", type: "進貨", qty: 50 },
                            { item: "血壓計", type: "出貨", qty: 2 },
                        ].map((tx, i) => (
                            <div key={i} className="bg-slate-800/30 p-3 rounded-xl flex items-center justify-between border border-white/5">
                                <span className="text-sm font-medium">{tx.item}</span>
                                <div className="flex items-center gap-3">
                                    <span className={`text-[10px] px-2 py-0.5 rounded ${tx.type === '進貨' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-orange-500/10 text-orange-500'}`}>{tx.type}</span>
                                    <span className="font-mono text-sm">×{tx.qty}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
